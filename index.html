<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSC Request Tracker</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- LOGO + TITLE -->
    <div class="header">
      <img src="logo.svg" alt="Logo" class="logo">
      <h1>OSC Request Tracker</h1>
      <p>Track your request status</p>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" id="tracking-input" placeholder="Enter Tracking Number">
      <button id="track-btn">Track Status</button>
    </div>

    <!-- STATES -->
    <div id="loading-state" class="hidden">Searching...</div>

    <div id="error-state" class="hidden">
      <p id="error-message"></p>
    </div>

    <div id="notfound-state" class="hidden"></div>

    <!-- RESULT CARD -->
    <div id="result-card" class="card hidden">

      <!-- HEADER -->
      <div class="card-header">
        <div>
          <span class="label">Tracking Number</span>
          <h2 id="res-tracking">—</h2>
        </div>

        <strong id="res-status-badge" class="status-badge">—</strong>
      </div>

      <!-- REQUEST DETAILS -->
      <div class="section">
        <div class="section-title">Request Details</div>

        <div class="row">
          <span>Full Name</span>
          <strong id="res-name">—</strong>
        </div>

        <div class="row">
          <span>Request Type</span>
          <strong id="res-type">—</strong>
        </div>

        <div class="row">
          <span>Project Title</span>
          <strong id="res-title">—</strong>
        </div>
      </div>

      <!-- ASSIGNMENT -->
      <div class="section">
        <div class="section-title">Assignment</div>

        <div class="row">
          <span>Person in Charge</span>
          <strong id="res-assigned" class="chip">—</strong>
        </div>
      </div>

      <!-- PROGRESS -->
      <div class="section">
        <div class="section-title">Progress</div>

        <div class="timeline" id="status-timeline">

          <div class="timeline-step" data-step="open">
            <span></span>
            <p>Open</p>
          </div>

          <div class="timeline-step" data-step="ongoing">
            <span></span>
            <p>Ongoing</p>
          </div>

          <div class="timeline-step" data-step="reviewing">
            <span></span>
            <p>Reviewing</p>
          </div>

          <div class="timeline-step" data-step="completed">
            <span></span>
            <p>Completed</p>
          </div>

        </div>
      </div>

      <!-- DATES -->
      <div class="section">
        <div class="section-title">Timeline</div>

        <div class="row">
          <span>Date Submitted</span>
          <strong id="res-date-submitted">—</strong>
        </div>

        <div class="row">
          <span>Date Needed</span>
          <strong id="res-date-needed">—</strong>
        </div>
      </div>

      <!-- QUEUE -->
      <div class="section">
        <div class="section-title">Queue</div>

        <div class="row">
          <span>Position</span>
          <strong id="res-queue">—</strong>
        </div>
      </div>

    </div>

  </div>

  <!-- IMPORTANT: script (2).js -->
  <script src="script (2).js"></script>

</body>
</html>
